loki:
  deploymentMode: Distributed

  lokiCanary:
    enabled: false

  singleBinary:
    replicas: 0
    persistence:
      enabled: false
  backend:
    replicas: 0
    persistence:
      enabled: false
  read:
    replicas: 0
    persistence:
      enabled: false
  write:
    replicas: 0
    persistence:
      enabled: false

  distributor:
    enabled: true
  ingester:
    enabled: true
  querier:
    enabled: true
  queryFrontend:
    enabled: true
  queryScheduler:
    enabled: true
  compactor:
    enabled: true
  indexGateway:
    enabled: true
  gateway:
    enabled: true
  ruler:
    enabled: false

  loki:
    auth_enabled: false

    storage:
      type: s3
      bucketNames:
        chunks: loki-poc
        ruler: loki-poc
        admin: loki-poc
      s3:
        endpoint: http://172.21.0.2:9000
        region: us-east-1
        secretAccessKey: minioadmin123
        accessKeyId: minioadmin
        s3ForcePathStyle: true
        insecure: true

    schemaConfig:
      configs:
        - from: "2024-04-01"
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_tsdb_index_
            period: 24h

    commonConfig:
      replication_factor: 1
      path_prefix: /var/loki
      compactor_grpc_address: '{{ include "loki.compactorAddress" . }}'

    server:
      http_listen_port: 3100
      grpc_listen_port: 9095
      log_level: info
      http_server_write_timeout: 310s
      grpc_server_max_recv_msg_size: 33554432
      grpc_server_max_send_msg_size: 33554432

    limits_config:
      retention_period: 2h
      query_timeout: 2m
      max_query_series: 10000
      max_entries_limit_per_query: 10000
      max_query_lookback: 2h
      split_queries_by_interval: 15m
      volume_enabled: true
      allow_structured_metadata: true
      max_cache_freshness_per_query: 10m
      reject_old_samples: true
      reject_old_samples_max_age: 2h
      ingestion_rate_mb: 10
      ingestion_burst_size_mb: 20
      max_streams_per_user: 10000
      max_line_size: 256000

    compactor:
      retention_enabled: true
      retention_delete_delay: 5m
      compaction_interval: 2m
      retention_delete_worker_count: 10
      delete_request_store: s3

    ingester:
      wal:
        enabled: true
        dir: /var/loki/wal
      chunk_idle_period: 30s
      max_chunk_age: 1m

    memberlistConfig: {}

  test:
    enabled: false

memberlist:
  service:
    publishNotReadyAddresses: false
